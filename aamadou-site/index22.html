<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amadou Sangaré | Carte Digitale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bleu-nuit: #0a192f;   /* Fond profond */
            --beige: #f5f5dc;        /* Texte et contrastes */
            --jaune-or: #d4af37;     /* Accents de luxe */
            --card-bg: rgba(10, 25, 47, 0.9); /* Bleu nuit transparent */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* INSERTION PHOTO ARRIÈRE-PLAN ICI */
            background: linear-gradient(rgba(10, 25, 47, 0.8), rgba(10, 25, 47, 0.8)), 
                        url('images/fond-accueil.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--beige);
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid var(--jaune-or); /* Bordure dorée fine */
            margin: 20px 0;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--jaune-or);
            box-shadow: 0 0 15px var(--jaune-or);
        }

        h1 { margin: 15px 0 5px; font-size: 1.6rem; color: var(--jaune-or); letter-spacing: 1px; }
        p { color: var(--beige); opacity: 0.8; margin-bottom: 25px; font-weight: 300; }

        .video-container {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--jaune-or);
        }

        .links-container { display: flex; flex-direction: column; gap: 12px; }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            text-decoration: none;
            color: var(--bleu-nuit);
            background: var(--jaune-or); /* Boutons en Or par défaut */
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .link-item i { margin-right: 10px; font-size: 1.2rem; }

        /* Effet au survol des boutons */
        .link-item:hover { 
            transform: translateY(-3px); 
            background: var(--beige);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        h3 { 
            margin-top: 30px; 
            color: var(--jaune-or); 
            font-size: 1.1rem; 
            border-bottom: 1px solid var(--jaune-or);
            display: inline-block;
            padding-bottom: 5px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .portfolio-grid img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: 0.3s;
        }
        
        .portfolio-grid img:hover {
            border-color: var(--jaune-or);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <img src="images/amadou.jpg" alt="Amadou Sangaré" class="profile-img">

    <h1>Amadou SANGARÉ</h1>
    <p>Manager & Créateur Design Studio</p>

    <div class="video-container">
        <iframe width="100%" height="200" src="https://www.youtube.com/embed/VOTRE_ID_VIDEO" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="links-container">
        <a href="https://wa.me/22362696220" class="link-item">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
        <a href="https://linkedin.com/in/amadou-sangare" class="link-item">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>
        <a href="https://instagram.com/amadoudesign" class="link-item">
            <i class="fab fa-instagram"></i> Instagram
        </a>
    </div>

    <h3>Mes Réalisations</h3>
    <div class="portfolio-grid">
        <img src="images/projet1.jpg" alt="Création Résine 1">
        <img src="images/projet2.jpg" alt="Création Résine 2">
    </div>
</div>

</body>
</html>
